services:
  - type: web
    name: ai-stress-microservice
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY2
        sync: false
      - key: GEMINI_API_KEY3
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: INDIAN_KANOON_API_KEY
        sync: false
      - key: EMOTION_MODEL_HF_KEY
        sync: false
